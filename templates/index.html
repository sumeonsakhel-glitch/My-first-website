<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalrinpuii | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            width: 350px; padding: 40px; text-align: center;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
        }
        .profile-img {
            width: 130px; height: 130px; border-radius: 50%;
            object-fit: cover; border: 4px solid #38bdf8; margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 12px; border-radius: 10px; text-decoration: none;
            font-weight: bold; transition: 0.3s; font-size: 14px;
        }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <img src="{{ url_for('static', filename='Lalrinpuii.jpg') }}" alt="Profile Image" class="profile-img">
        <h1>Lalrinpuii</h1>
        <p>Learning Web Development with Python. Welcome to my personal space on the internet!</p>
        
        <div class="btn-group">
            <!-- I link duh tak kha ka lo belh thlap tawh e -->
            <a href="https://www.instagram.com/may_boihtei?igsh=MW1mZGxndWNyMDlpOQ==" target="_blank" class="btn btn-primary">Follow on Instagram</a>
            <a href="/about" class="btn btn-secondary">About Me</a>
        </div>
    </div>

</body>
</html>
